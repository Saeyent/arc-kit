<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0c0c"/>
      <stop offset="100%" style="stop-color:#1a1d2e"/>
    </linearGradient>
    <filter id="flagShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <symbol id="usStar" viewBox="-15 -15 30 30">
      <polygon fill="#FFFFFF" stroke="#FFFFFF" stroke-width="0.3" stroke-linejoin="round"
        points="0,-14 3.14,-4.32 13.31,-4.32 5.08,1.65 8.22,11.32 0,5.35 -8.22,11.32 -5.08,1.65 -13.31,-4.32 -3.14,-4.32"/>
    </symbol>
  </defs>

  <!-- Background -->
  <rect width="1200" height="680" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#f0f0f0" stroke-width="0.5">
    <g><line x1="40" y1="0" x2="40" y2="680"/><line x1="80" y1="0" x2="80" y2="680"/><line x1="120" y1="0" x2="120" y2="680"/><line x1="160" y1="0" x2="160" y2="680"/><line x1="200" y1="0" x2="200" y2="680"/><line x1="240" y1="0" x2="240" y2="680"/><line x1="280" y1="0" x2="280" y2="680"/><line x1="320" y1="0" x2="320" y2="680"/><line x1="360" y1="0" x2="360" y2="680"/><line x1="400" y1="0" x2="400" y2="680"/><line x1="440" y1="0" x2="440" y2="680"/><line x1="480" y1="0" x2="480" y2="680"/><line x1="520" y1="0" x2="520" y2="680"/><line x1="560" y1="0" x2="560" y2="680"/><line x1="600" y1="0" x2="600" y2="680"/><line x1="640" y1="0" x2="640" y2="680"/><line x1="680" y1="0" x2="680" y2="680"/><line x1="720" y1="0" x2="720" y2="680"/><line x1="760" y1="0" x2="760" y2="680"/><line x1="800" y1="0" x2="800" y2="680"/><line x1="840" y1="0" x2="840" y2="680"/><line x1="880" y1="0" x2="880" y2="680"/><line x1="920" y1="0" x2="920" y2="680"/><line x1="960" y1="0" x2="960" y2="680"/><line x1="1000" y1="0" x2="1000" y2="680"/><line x1="1040" y1="0" x2="1040" y2="680"/><line x1="1080" y1="0" x2="1080" y2="680"/><line x1="1120" y1="0" x2="1120" y2="680"/><line x1="1160" y1="0" x2="1160" y2="680"/></g>
    <g><line x1="0" y1="40" x2="1200" y2="40"/><line x1="0" y1="80" x2="1200" y2="80"/><line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="160" x2="1200" y2="160"/><line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="280" x2="1200" y2="280"/><line x1="0" y1="320" x2="1200" y2="320"/><line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="400" x2="1200" y2="400"/><line x1="0" y1="440" x2="1200" y2="440"/><line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="520" x2="1200" y2="520"/><line x1="0" y1="560" x2="1200" y2="560"/><line x1="0" y1="600" x2="1200" y2="600"/><line x1="0" y1="640" x2="1200" y2="640"/></g>
  </g>

  <!-- Top header -->
  <text x="600" y="68" text-anchor="middle" fill="#b1b4b6" font-size="14" letter-spacing="3" font-weight="600">RELEASE  ·  v5.1  ·  COMMUNITY  OVERLAY  ·  UNITED  STATES</text>

  <!-- US flag (centred), 400x210, official 10:19 ratio approximated for visual balance.
       13 stripes (7 red, 6 white) starting with red on top. Canton is blue, 7 stripes tall, 2/5 flag width.
       50 stars in 9 staggered rows (5 rows of 6 + 4 rows of 5). -->
  <g transform="translate(400, 140)" filter="url(#flagShadow)">
    <!-- Stripes: 13 bands, each 210/13 ≈ 16.154 tall. Field colour white; red bands overlaid. -->
    <rect x="0" y="0" width="400" height="210" fill="#FFFFFF" stroke="#2a2d3e" stroke-width="1"/>
    <rect x="0" y="0" width="400" height="16.154" fill="#B22234"/>
    <rect x="0" y="32.308" width="400" height="16.154" fill="#B22234"/>
    <rect x="0" y="64.615" width="400" height="16.154" fill="#B22234"/>
    <rect x="0" y="96.923" width="400" height="16.154" fill="#B22234"/>
    <rect x="0" y="129.231" width="400" height="16.154" fill="#B22234"/>
    <rect x="0" y="161.538" width="400" height="16.154" fill="#B22234"/>
    <rect x="0" y="193.846" width="400" height="16.154" fill="#B22234"/>

    <!-- Canton: 7 stripes tall = 113.077; 2/5 flag width = 160. -->
    <rect x="0" y="0" width="160" height="113.077" fill="#3C3B6E"/>

    <!-- 50 stars, 9 rows.
         Star centres horizontally: 6-star rows at x = 160 * k/12 for k = 1,3,5,7,9,11.
         5-star rows at x = 160 * k/12 for k = 2,4,6,8,10.
         Star centres vertically: 9 rows at y = 113.077 * i/10 for i = 1..9.
         Star size 12 (use placement: subtract 6 from x and y to centre). -->

    <!-- Row 1 (6 stars, y=11.308) -->
    <use href="#usStar" x="7.333"   y="5.308" width="12" height="12"/>
    <use href="#usStar" x="34"      y="5.308" width="12" height="12"/>
    <use href="#usStar" x="60.667"  y="5.308" width="12" height="12"/>
    <use href="#usStar" x="87.333"  y="5.308" width="12" height="12"/>
    <use href="#usStar" x="114"     y="5.308" width="12" height="12"/>
    <use href="#usStar" x="140.667" y="5.308" width="12" height="12"/>
    <!-- Row 2 (5 stars, y=22.615) -->
    <use href="#usStar" x="20.667"  y="16.615" width="12" height="12"/>
    <use href="#usStar" x="47.333"  y="16.615" width="12" height="12"/>
    <use href="#usStar" x="74"      y="16.615" width="12" height="12"/>
    <use href="#usStar" x="100.667" y="16.615" width="12" height="12"/>
    <use href="#usStar" x="127.333" y="16.615" width="12" height="12"/>
    <!-- Row 3 (6 stars, y=33.923) -->
    <use href="#usStar" x="7.333"   y="27.923" width="12" height="12"/>
    <use href="#usStar" x="34"      y="27.923" width="12" height="12"/>
    <use href="#usStar" x="60.667"  y="27.923" width="12" height="12"/>
    <use href="#usStar" x="87.333"  y="27.923" width="12" height="12"/>
    <use href="#usStar" x="114"     y="27.923" width="12" height="12"/>
    <use href="#usStar" x="140.667" y="27.923" width="12" height="12"/>
    <!-- Row 4 (5 stars, y=45.231) -->
    <use href="#usStar" x="20.667"  y="39.231" width="12" height="12"/>
    <use href="#usStar" x="47.333"  y="39.231" width="12" height="12"/>
    <use href="#usStar" x="74"      y="39.231" width="12" height="12"/>
    <use href="#usStar" x="100.667" y="39.231" width="12" height="12"/>
    <use href="#usStar" x="127.333" y="39.231" width="12" height="12"/>
    <!-- Row 5 (6 stars, y=56.538) -->
    <use href="#usStar" x="7.333"   y="50.538" width="12" height="12"/>
    <use href="#usStar" x="34"      y="50.538" width="12" height="12"/>
    <use href="#usStar" x="60.667"  y="50.538" width="12" height="12"/>
    <use href="#usStar" x="87.333"  y="50.538" width="12" height="12"/>
    <use href="#usStar" x="114"     y="50.538" width="12" height="12"/>
    <use href="#usStar" x="140.667" y="50.538" width="12" height="12"/>
    <!-- Row 6 (5 stars, y=67.846) -->
    <use href="#usStar" x="20.667"  y="61.846" width="12" height="12"/>
    <use href="#usStar" x="47.333"  y="61.846" width="12" height="12"/>
    <use href="#usStar" x="74"      y="61.846" width="12" height="12"/>
    <use href="#usStar" x="100.667" y="61.846" width="12" height="12"/>
    <use href="#usStar" x="127.333" y="61.846" width="12" height="12"/>
    <!-- Row 7 (6 stars, y=79.154) -->
    <use href="#usStar" x="7.333"   y="73.154" width="12" height="12"/>
    <use href="#usStar" x="34"      y="73.154" width="12" height="12"/>
    <use href="#usStar" x="60.667"  y="73.154" width="12" height="12"/>
    <use href="#usStar" x="87.333"  y="73.154" width="12" height="12"/>
    <use href="#usStar" x="114"     y="73.154" width="12" height="12"/>
    <use href="#usStar" x="140.667" y="73.154" width="12" height="12"/>
    <!-- Row 8 (5 stars, y=90.461) -->
    <use href="#usStar" x="20.667"  y="84.461" width="12" height="12"/>
    <use href="#usStar" x="47.333"  y="84.461" width="12" height="12"/>
    <use href="#usStar" x="74"      y="84.461" width="12" height="12"/>
    <use href="#usStar" x="100.667" y="84.461" width="12" height="12"/>
    <use href="#usStar" x="127.333" y="84.461" width="12" height="12"/>
    <!-- Row 9 (6 stars, y=101.769) -->
    <use href="#usStar" x="7.333"   y="95.769" width="12" height="12"/>
    <use href="#usStar" x="34"      y="95.769" width="12" height="12"/>
    <use href="#usStar" x="60.667"  y="95.769" width="12" height="12"/>
    <use href="#usStar" x="87.333"  y="95.769" width="12" height="12"/>
    <use href="#usStar" x="114"     y="95.769" width="12" height="12"/>
    <use href="#usStar" x="140.667" y="95.769" width="12" height="12"/>
  </g>

  <!-- Flag caption -->
  <text x="600" y="384" text-anchor="middle" fill="#b1b4b6" font-size="13" letter-spacing="2" font-weight="600">UNITED  STATES  ·  10  FEDERAL  CIVILIAN  COMMANDS</text>

  <!-- Main title -->
  <text x="600" y="448" text-anchor="middle" fill="#f0f0f0" font-size="58" font-weight="700" letter-spacing="-0.5">ArcKit v5.1</text>

  <!-- Subtitle -->
  <text x="600" y="492" text-anchor="middle" fill="#f0f0f0" font-size="26" font-weight="400">10 US Federal Civilian Regulatory Commands</text>

  <!-- Tagline -->
  <text x="600" y="528" text-anchor="middle" fill="#9b9ea3" font-size="16" letter-spacing="0.5">Community-contributed  ·  Recipe: us-federal (5 waves)  ·  Layered on the official baseline</text>

  <!-- Divider -->
  <line x1="200" y1="558" x2="1000" y2="558" stroke="#2a2d3e" stroke-width="1"/>

  <!-- Command list, two rows so it doesn't run wide -->
  <text x="600" y="592" text-anchor="middle" fill="#7a8088" font-size="14" font-family="'SF Mono', 'Consolas', 'Liberation Mono', monospace" letter-spacing="0.5">
    us-fisma-categorization  ·  us-nist-800-53  ·  us-fedramp-ssp  ·  us-fedramp-readiness  ·  us-zero-trust
  </text>
  <text x="600" y="618" text-anchor="middle" fill="#7a8088" font-size="14" font-family="'SF Mono', 'Consolas', 'Liberation Mono', monospace" letter-spacing="0.5">
    us-icam  ·  us-ai-rmf  ·  us-ai-impact  ·  us-privacy-pia  ·  us-sbom-eo-14028
  </text>

  <!-- Bottom signature -->
  <text x="600" y="666" text-anchor="middle" fill="#505a5f" font-size="11" letter-spacing="2">ARCKIT.ORG  ·  ENTERPRISE ARCHITECTURE GOVERNANCE TOOLKIT</text>
</svg>
