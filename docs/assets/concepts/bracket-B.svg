<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bracket B concept">
<title>ArcKit concept: angle brackets + caret + cursor</title>

<rect width="120" height="120" rx="20" fill="#F4F6F8"/>

<g fill="none" stroke="#0B1F33" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
  <!-- Left angle bracket -->
  <polyline points="38,28 18,60 38,92" />
  <!-- Right angle bracket -->
  <polyline points="82,28 102,60 82,92" />
</g>

<!-- Inner caret (^) — the prompt indicator -->
<polyline points="48,68 60,52 72,68"
  fill="none" stroke="#0B1F33" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

<!-- Teal cursor / underscore -->
<line x1="50" y1="80" x2="70" y2="80" stroke="#1ED3C6" stroke-width="6" stroke-linecap="round"/>
</svg>
