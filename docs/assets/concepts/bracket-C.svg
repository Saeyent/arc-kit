<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bracket C concept">
<title>ArcKit concept: brackets containing Claude-echo asterisk</title>

<rect width="120" height="120" rx="20" fill="#F4F6F8"/>

<g fill="none" stroke="#0B1F33" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
  <polyline points="40,28 24,28 24,92 40,92" />
  <polyline points="80,28 96,28 96,92 80,92" />
</g>

<!-- Three teal rays radiating from centre — pairs visually with Claude's mark
     while remaining contained inside the navy harness brackets -->
<g stroke="#1ED3C6" stroke-width="6" stroke-linecap="round">
  <line x1="60" y1="40" x2="60" y2="60" />
  <line x1="44" y1="74" x2="58" y2="63" />
  <line x1="76" y1="74" x2="62" y2="63" />
</g>
<circle cx="60" cy="60" r="4.5" fill="#0B1F33"/>
</svg>
