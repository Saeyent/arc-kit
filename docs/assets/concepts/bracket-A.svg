<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bracket A concept">
<title>ArcKit concept: square brackets + structural A</title>

<rect width="120" height="120" rx="20" fill="#F4F6F8"/>

<g fill="none" stroke="#0B1F33" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
  <!-- Left bracket -->
  <polyline points="40,30 26,30 26,90 40,90" />
  <!-- Right bracket -->
  <polyline points="80,30 94,30 94,90 80,90" />
</g>

<!-- Inner A glyph: peak + crossbar -->
<g fill="none" stroke="#0B1F33" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
  <polyline points="46,80 60,38 74,80" />
</g>
<!-- Teal "harness" crossbar -->
<line x1="50" y1="63" x2="70" y2="63" stroke="#1ED3C6" stroke-width="5" stroke-linecap="round"/>
</svg>
