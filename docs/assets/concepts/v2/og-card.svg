<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ArcKit - The Enterprise Architecture Governance Harness">
<title>ArcKit - The Enterprise Architecture Governance Harness</title>

<rect width="1200" height="630" fill="#0B1F33" />

<!-- Subtle grid -->
<g stroke="#1ED3C6" stroke-width="0.5" stroke-opacity="0.08">
  <line x1="0" y1="200" x2="1200" y2="200" />
  <line x1="0" y1="430" x2="1200" y2="430" />
  <line x1="240" y1="0" x2="240" y2="630" />
  <line x1="960" y1="0" x2="960" y2="630" />
</g>

<!-- Mark, large, centred upper-third (mark x-centre is at native x=60, so translate by 600-60*2.5=450) -->
<g transform="translate(450, 100) scale(2.5)">
  <g fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="38,28 18,60 38,92" />
    <polyline points="82,28 102,60 82,92" />
  </g>
  <polyline points="46,66 60,48 74,66"
    fill="none" stroke="#FFFFFF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="46" y1="84" x2="74" y2="84" stroke="#1ED3C6" stroke-width="5" stroke-linecap="round"/>
  <circle cx="46" cy="84" r="4.5" fill="#1ED3C6"/>
  <circle cx="74" cy="84" r="4.5" fill="#1ED3C6"/>
  <circle cx="60" cy="84" r="5" fill="#FFFFFF"/>
</g>

<!-- Wordmark -->
<text x="600" y="450" font-family="Inter, IBM Plex Sans, SF Pro, -apple-system, system-ui, Segoe UI, Roboto, 'Helvetica Neue', Arial, sans-serif"
font-size="120" font-weight="700" fill="#FFFFFF" letter-spacing="-1px" text-anchor="middle">ArcKit</text>

<!-- Tagline -->
<text x="600" y="505" font-family="Inter, IBM Plex Sans, SF Pro, -apple-system, system-ui, Segoe UI, Roboto, 'Helvetica Neue', Arial, sans-serif"
font-size="30" font-weight="500" fill="#1ED3C6" letter-spacing="0.5px" text-anchor="middle">The Enterprise Architecture Governance Harness</text>

<!-- Secondary -->
<text x="600" y="552" font-family="Inter, IBM Plex Sans, SF Pro, -apple-system, system-ui, Segoe UI, Roboto, 'Helvetica Neue', Arial, sans-serif"
font-size="22" font-weight="400" fill="#B1B4B6" letter-spacing="0.3px" text-anchor="middle">Strategy · Architecture · Delivery · Assurance</text>

<!-- URL -->
<text x="600" y="600" font-family="Inter, IBM Plex Sans, SF Pro, -apple-system, system-ui, Segoe UI, Roboto, 'Helvetica Neue', Arial, sans-serif"
font-size="18" font-weight="400" fill="#5A6A78" letter-spacing="0.5px" text-anchor="middle">arckit.org</text>
</svg>
