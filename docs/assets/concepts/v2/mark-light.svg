<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ArcKit mark">
<title>ArcKit</title>

<!-- Angle brackets (harness frame) -->
<g fill="none" stroke="#0B1F33" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
  <polyline points="38,28 18,60 38,92" />
  <polyline points="82,28 102,60 82,92" />
</g>

<!-- Caret (prompt indicator) -->
<polyline points="46,66 60,48 74,66"
  fill="none" stroke="#0B1F33" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

<!-- Linchpin cursor: terminal anchors + centre pin -->
<line x1="46" y1="84" x2="74" y2="84" stroke="#1ED3C6" stroke-width="5" stroke-linecap="round"/>
<circle cx="46" cy="84" r="4.5" fill="#1ED3C6"/>
<circle cx="74" cy="84" r="4.5" fill="#1ED3C6"/>
<circle cx="60" cy="84" r="5" fill="#0B1F33"/>
</svg>
